<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker — LeCocoJ V2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: white; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #999; }

  .day-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; }
  .dtab { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0; font-size: 13px; cursor: pointer; background: white; }
  .dtab.active { background: #111; color: white; }

  .blocks { display: flex; flex-direction: column; gap: 8px; }

  .block-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid #eee; background: white;
    cursor: pointer; position: relative; overflow: hidden;
  }

  .block-row.done::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(76,175,80,0.08);
  }

  .check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; }
  .block-row.done .check { background: #4CAF50; color: white; }

  .bcat { width: 10px; height: 10px; border-radius: 3px; }
  .binfo { flex: 1; }
  .blabel { font-size: 14px; }
  .btime { font-size: 11px; color: #999; }

  .congrats { display:none; background:#f0fdf0; border:1.5px solid #4CAF50; padding:12px; text-align:center; margin-bottom:10px; }
</style>
</head>
<body>

<h1>LeCocoJ — Tracker V2</h1>
<p class="subtitle">Version améliorée 💪</p>

<div class="stats">
  <div class="stat"><div class="stat-val" id="today-score">0%</div><div class="stat-lbl">Aujourd'hui</div></div>
  <div class="stat"><div class="stat-val" id="streak">0 🔥</div><div class="stat-lbl">Streak</div></div>
</div>

<div class="congrats" id="congrats">🎉 Journée complète !</div>

<div class="day-tabs" id="day-tabs"></div>
<div class="blocks" id="blocks"></div>

<script>
const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

const SCHEDULE = {
  0: [
    { id:'l1', label:'Boulot' },
    { id:'l2', label:'Sport' },
  ],
  1: [
    { id:'m1', label:'Boulot' },
    { id:'m2', label:'App' },
  ]
};

let state = JSON.parse(localStorage.getItem('lecocoj_v2') || '{}');

let currentDay = new Date().getDay();
currentDay = currentDay === 0 ? 6 : currentDay - 1;

function todayKey(dayIdx, blockId) {
  const today = new Date().toISOString().slice(0,10);
  return today + '_' + dayIdx + '_' + blockId;
}

function toggle(dayIdx, blockId) {
  const key = todayKey(dayIdx, blockId);

  if (state[key]) delete state[key];
  else state[key] = true;

  if (navigator.vibrate) navigator.vibrate(10);

  save(); render();
}

function save() {
  localStorage.setItem('lecocoj_v2', JSON.stringify(state));
}

function getDayPct(i) {
  const blocks = SCHEDULE[i] || [];
  if (!blocks.length) return 0;

  const done = blocks.filter(b => state[todayKey(i,b.id)]).length;
  return Math.round(done / blocks.length * 100);
}

function render() {
  renderTabs(); renderBlocks(); renderStats();
}

function renderTabs() {
  document.getElementById('day-tabs').innerHTML = DAYS.map((d,i)=>
    `<button class="dtab ${i===currentDay?'active':''}" onclick="switchDay(${i})">${d}</button>`
  ).join('');
}

function renderBlocks() {
  const blocks = SCHEDULE[currentDay] || [];

  document.getElementById('blocks').innerHTML = blocks.map(b=>{
    const key = todayKey(currentDay,b.id);
    const done = state[key];

    return `<div class="block-row ${done?'done':''}" onclick="toggle(${currentDay},'${b.id}')">
      <div class="check">${done?'✓':''}</div>
      <div class="binfo">
        <div class="blabel">${b.label}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('congrats').style.display = getDayPct(currentDay)===100?'block':'none';
}

function renderStats() {
  document.getElementById('today-score').textContent = getDayPct(currentDay)+'%';

  let streak=0;
  for(let i=currentDay;i>=0;i--){
    if(getDayPct(i)>=80) streak++;
    else break;
  }

  document.getElementById('streak').textContent = streak+' 🔥';
}

function switchDay(i){ currentDay=i; render(); }

render();
</script>

</body>
</html>
